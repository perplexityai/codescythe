name: Codescythe CLI Release

on:
  push:
    tags:
      - "codescythe_cli_v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build and verify only, no release)"
        type: boolean
        required: false
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release binaries
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-release-binaries
          repository-cache: true

      - name: Build binaries
        run: |
          set -euo pipefail

          bazel build \
            //crates/codescythe_cli:release_binary_darwin_arm64 \
            //crates/codescythe_cli:release_binary_linux_amd64 \
            //crates/codescythe_cli:release_binary_linux_arm64

          mkdir -p artifacts

          copy_artifact() {
            local target="$1"
            local output="$2"
            local binary_path

            binary_path="$(bazel cquery --output=files "$target" | tail -n 1)"
            cp "$binary_path" "artifacts/$output"
            chmod +x "artifacts/$output"
          }

          copy_artifact //crates/codescythe_cli:release_binary_darwin_arm64 codescythe-darwin-arm64
          copy_artifact //crates/codescythe_cli:release_binary_linux_amd64 codescythe-linux-amd64
          copy_artifact //crates/codescythe_cli:release_binary_linux_arm64 codescythe-linux-arm64

      - name: Upload macOS ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: codescythe-darwin-arm64
          path: artifacts/codescythe-darwin-arm64
          retention-days: 7

      - name: Upload Linux AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: codescythe-linux-amd64
          path: artifacts/codescythe-linux-amd64
          retention-days: 7

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: codescythe-linux-arm64
          path: artifacts/codescythe-linux-arm64
          retention-days: 7

  verify:
    name: Verify ${{ matrix.name }}
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            runner: macos-15
            artifact: codescythe-darwin-arm64
            binary: codescythe-darwin-arm64
          - name: Linux AMD64
            runner: ubuntu-24.04
            artifact: codescythe-linux-amd64
            binary: codescythe-linux-amd64
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            artifact: codescythe-linux-arm64
            binary: codescythe-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts

      - name: Smoke test binary
        run: |
          set -euo pipefail

          binary="artifacts/${{ matrix.binary }}"
          chmod +x "$binary"
          file "$binary"

          "$binary" --version
          "$binary" --help

          set +e
          output="$("$binary" --json -C tests/fixtures/knip-export-basics)"
          status="$?"
          set -e

          if [ "$status" -ne 1 ]; then
            echo "expected fixture analysis to exit with 1, got $status" >&2
            echo "$output"
            exit 1
          fi

          echo "$output" | grep '"dangling.ts"'

          if [ "${{ runner.os }}" = "Linux" ]; then
            ldd_output="$(ldd "$binary" 2>&1 || true)"
            echo "$ldd_output"
            if echo "$ldd_output" | grep -Eq "not a dynamic executable|statically linked"; then
              echo "$binary is static"
            elif strings "$binary" | grep -q 'GLIBC_'; then
              echo "$binary unexpectedly references glibc symbols" >&2
              exit 1
            else
              echo "$binary has no GLIBC_ symbol references"
            fi
          fi

  release:
    name: Create release
    needs:
      - build
      - verify
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    if: ${{ startsWith(github.ref, 'refs/tags/codescythe_cli_v') && (github.event_name == 'push' || inputs.dry_run == false) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Organize artifacts
        run: |
          set -euo pipefail

          mkdir -p release-assets
          for binary in codescythe-darwin-arm64 codescythe-linux-amd64 codescythe-linux-arm64; do
            cp "release/$binary/$binary" "release-assets/$binary"
            chmod +x "release-assets/$binary"
          done

          rm -rf release
          mv release-assets release

      - name: Generate checksums
        run: |
          set -euo pipefail

          cd release
          shasum -a 256 codescythe-* > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        id: git-cliff
        uses: orhun/git-cliff-action@v4.6.0
        with:
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_REPO: ${{ github.repository }}
          OUTPUT: release/changelog.md

      - name: Prepare release notes
        run: |
          set -euo pipefail

          if [ ! -s release/changelog.md ]; then
            echo "No conventional commits found for this release." > release/changelog.md
          fi

          cat > release/body.md <<EOF
          ## Codescythe CLI Release

          ### Binaries
          - **macOS Apple Silicon**: \`codescythe-darwin-arm64\`
          - **Linux AMD64**: \`codescythe-linux-amd64\`
          - **Linux ARM64**: \`codescythe-linux-arm64\`

          ### Installation

          \`\`\`bash
          # macOS (Apple Silicon)
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/codescythe-darwin-arm64
          chmod +x codescythe-darwin-arm64
          sudo mv codescythe-darwin-arm64 /usr/local/bin/codescythe

          # Linux AMD64
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/codescythe-linux-amd64
          chmod +x codescythe-linux-amd64
          sudo mv codescythe-linux-amd64 /usr/local/bin/codescythe

          # Linux ARM64
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/codescythe-linux-arm64
          chmod +x codescythe-linux-arm64
          sudo mv codescythe-linux-arm64 /usr/local/bin/codescythe
          \`\`\`

          ### Verification

          \`\`\`bash
          curl -LO https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/checksums.txt
          shasum -a 256 -c checksums.txt
          \`\`\`

          ### Changes

          EOF

          cat release/changelog.md >> release/body.md

      - name: List release artifacts
        run: |
          ls -lh release
          echo "---"
          cat release/checksums.txt
          echo "---"
          cat release/body.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/codescythe-darwin-arm64 \
            release/codescythe-linux-amd64 \
            release/codescythe-linux-arm64 \
            release/checksums.txt \
            --title "Codescythe CLI ${{ github.ref_name }}" \
            --notes-file release/body.md \
            --verify-tag
