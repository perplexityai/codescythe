name: Codescythe npm Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build and verify only, no publish)"
        type: boolean
        required: false
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build npm packages
    runs-on: ubuntu-24.04-16core

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-npm-packages
          repository-cache: true

      - name: Build npm packages
        run: |
          set -euo pipefail

          bazel build :dist

      - name: Prepare npm dist artifact
        run: |
          set -euo pipefail

          dist_path="$(bazel cquery --output=files :dist)"
          cp -R "$dist_path" release
          chmod -R +w release

      - name: Upload npm dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-dist
          path: release
          retention-days: 7

  verify:
    name: Verify npm package (${{ matrix.name }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            runner: macos-15
            package: codescythe-darwin-arm64
          - name: linux-amd64
            runner: ubuntu-24.04-16core
            package: codescythe-linux-amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            package: codescythe-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install npm test dependencies
        run: pnpm install --frozen-lockfile

      - name: Download npm dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: npm-dist
          path: release

      - name: Smoke test package
        run: |
          set -euo pipefail

          CODESCYTHE_PACKAGE_DIR=release/packages/codescythe \
          CODESCYTHE_NATIVE_PACKAGE_DIR=release/packages/${{ matrix.package }} \
          pnpm test:npm

          if [ "${{ runner.os }}" = "Linux" ]; then
            native_node="$(find "release/packages/${{ matrix.package }}" -name '*.node' -print -quit)"
            file "$native_node"
            ldd_output="$(ldd "$native_node" 2>&1 || true)"
            echo "$ldd_output"
            if echo "$ldd_output" | grep -q 'not found'; then
              echo "$native_node has missing runtime libraries" >&2
              exit 1
            fi
          fi

  publish:
    name: Publish npm packages
    needs:
      - build
      - verify
    runs-on: ubuntu-24.04-16core
    permissions:
      contents: read
      id-token: write
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'codescythe_cli_v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && startsWith(github.ref_name, 'codescythe_cli_v')) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Download npm dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: npm-dist
          path: release

      - name: Install publish dependencies
        working-directory: release
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Publish packages
        working-directory: release
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./packages/codescythe/package.json').version")"
          if [[ "$package_version" == *-e2e.* ]]; then
            npm_dist_tag=e2e
          elif [[ "$package_version" == *-* ]]; then
            npm_dist_tag=next
          else
            npm_dist_tag=latest
          fi

          pnpm -r publish --access public --tag "$npm_dist_tag" --no-git-checks
