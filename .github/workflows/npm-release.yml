name: Codescythe npm Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build and verify only, no publish)"
        type: boolean
        required: false
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build npm packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-npm-packages
          repository-cache: true

      - name: Build npm packages
        run: |
          set -euo pipefail

          bazel build \
            //crates/codescythe_napi:release_node_darwin_arm64 \
            //crates/codescythe_napi:release_node_linux_amd64 \
            //crates/codescythe_napi:release_node_linux_arm64 \
            //packages/codescythe:package \
            //packages/codescythe-darwin-arm64:package \
            //packages/codescythe-linux-amd64:package \
            //packages/codescythe-linux-arm64:package

      - name: Prepare npm smoke artifacts
        run: |
          set -euo pipefail

          node --experimental-transform-types tools/prepare_npm_publish_artifacts.ts artifacts

      - name: Upload loader package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package-codescythe
          path: artifacts/codescythe
          retention-days: 7

      - name: Upload Darwin arm64 package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package-codescythe-darwin-arm64
          path: artifacts/codescythe-darwin-arm64
          retention-days: 7

      - name: Upload Linux amd64 package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package-codescythe-linux-amd64
          path: artifacts/codescythe-linux-amd64
          retention-days: 7

      - name: Upload Linux arm64 package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-package-codescythe-linux-arm64
          path: artifacts/codescythe-linux-arm64
          retention-days: 7

  verify:
    name: Verify npm package (${{ matrix.name }})
    needs: build
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            runner: macos-15
            package: codescythe-darwin-arm64
          - name: linux-amd64
            runner: ubuntu-24.04
            package: codescythe-linux-amd64
          - name: linux-arm64
            runner: ubuntu-24.04-arm
            package: codescythe-linux-arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install npm test dependencies
        run: pnpm install --frozen-lockfile

      - name: Download loader package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package-codescythe
          path: smoke/codescythe

      - name: Download native package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package-${{ matrix.package }}
          path: smoke/${{ matrix.package }}

      - name: Smoke test package
        run: |
          set -euo pipefail

          CODESCYTHE_PACKAGE_DIR=smoke/codescythe \
          CODESCYTHE_NATIVE_PACKAGE_DIR=smoke/${{ matrix.package }} \
          pnpm test:npm

          if [ "${{ runner.os }}" = "Linux" ]; then
            native_node="$(find "smoke/${{ matrix.package }}" -name '*.node' -print -quit)"
            file "$native_node"
            ldd_output="$(ldd "$native_node" 2>&1 || true)"
            echo "$ldd_output"
            if echo "$ldd_output" | grep -q 'not found'; then
              echo "$native_node has missing runtime libraries" >&2
              exit 1
            fi
          fi

  publish:
    name: Publish npm packages
    needs:
      - build
      - verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'codescythe_cli_v')) || (github.event_name == 'workflow_dispatch' && inputs.dry_run == false && startsWith(github.ref_name, 'codescythe_cli_v')) }}

    steps:
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download loader package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package-codescythe
          path: artifacts/codescythe

      - name: Download Darwin arm64 package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package-codescythe-darwin-arm64
          path: artifacts/codescythe-darwin-arm64

      - name: Download Linux amd64 package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package-codescythe-linux-amd64
          path: artifacts/codescythe-linux-amd64

      - name: Download Linux arm64 package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: npm-package-codescythe-linux-arm64
          path: artifacts/codescythe-linux-arm64

      - name: Publish packages
        run: |
          set -euo pipefail

          npm publish --access public ./artifacts/codescythe-darwin-arm64
          npm publish --access public ./artifacts/codescythe-linux-amd64
          npm publish --access public ./artifacts/codescythe-linux-arm64
          npm publish --access public ./artifacts/codescythe
