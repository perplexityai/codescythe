<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-labelledby="title desc">
  <title id="title">Codescythe logo</title>
  <desc id="desc">A dark rounded-square logo with code brackets and a cyan-purple scythe.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <linearGradient id="bladeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>

    <linearGradient id="handleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <path
    d="M 150 176 L 48 256 L 150 336"
    fill="none"
    stroke="#1E293B"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <path
    d="M 362 176 L 464 256 L 362 336"
    fill="none"
    stroke="#1E293B"
    stroke-width="36"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <line
    x1="180"
    y1="430"
    x2="320"
    y2="120"
    stroke="url(#handleGrad)"
    stroke-width="32"
    stroke-linecap="round"
  />

  <path d="M 330 110 Q 200 40 80 180 Q 180 110 290 160 Z" fill="url(#bladeGrad)" />

  <path
    d="M 330 110 Q 200 40 80 180"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="4"
    stroke-linecap="round"
    opacity="0.6"
  />
</svg>
